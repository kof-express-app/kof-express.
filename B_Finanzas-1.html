<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KOF-EXPRESS — Finanzas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0c10;color:#dde3ef;min-height:100vh}
:root{--ac:#f5c842;--bg:#0a0c10;--pan:#111520;--card:#171e2b;--bor:#1f2a3d;--mut:#4e5a70;--ok:#22c55e;--err:#ef4444;--inf:#3b82f6;--cup:#f97316;--pur:#a855f7}
#sidebar{width:210px;background:#0d1017;border-right:1px solid var(--bor);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow:hidden;transition:width .2s}
#sidebar.closed{width:0}
.sb-logo{padding:16px 14px 10px}
.sb-logo .n{color:var(--ac);font-weight:900;font-size:14px;letter-spacing:1px}
.sb-logo .s{color:var(--mut);font-size:10px;margin-top:2px}
.sb-badge{background:#22c55e22;border:1px solid #22c55e44;border-radius:5px;padding:2px 8px;font-size:9px;color:var(--ok);font-weight:700;margin-top:6px;display:inline-block}
nav{flex:1;padding:4px 8px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--mut);cursor:pointer;font-size:13px;font-weight:500;margin-bottom:2px;text-align:left;font-family:inherit;white-space:nowrap}
.nb:hover{background:rgba(34,197,94,.08);color:#dde3ef}
.nb.active{background:var(--ok);color:#0a0c10;font-weight:800}
.sb-bot{padding:10px 14px;border-top:1px solid var(--bor);font-size:10px}
.sb-lnk{display:block;background:#3b82f611;border:1px solid #3b82f633;border-radius:6px;padding:6px 10px;color:#3b82f6;font-size:11px;font-weight:700;text-decoration:none;margin-bottom:5px;text-align:center}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:4px}
.sdot.off{background:var(--err)}
#main{margin-left:210px;display:flex;flex-direction:column;min-height:100vh;transition:margin .2s}
#main.full{margin-left:0}
#topbar{background:#111520;border-bottom:1px solid var(--bor);padding:10px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:40}
#topbar h1{font-size:15px;font-weight:700;margin:0}
#tstats{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap}
.tstat{background:var(--card);border:1px solid var(--bor);border-radius:6px;padding:4px 10px;font-size:11px}
#content{flex:1;padding:20px;overflow-y:auto}
.phdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.phdr h2{color:var(--ac);margin:0;font-size:18px}
.phdr p{color:var(--mut);font-size:11px;margin:3px 0 0}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.sbox{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:14px 16px;flex:1;min-width:110px}
.sbox .sl{color:var(--mut);font-size:10px;margin-bottom:3px}
.sbox .sv{font-size:20px;font-weight:800;line-height:1.1}
.card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:18px;margin-bottom:14px}
button{cursor:pointer;border:none;border-radius:7px;font-family:inherit;font-weight:700;transition:opacity .15s}
button:hover{opacity:.85}
button:disabled{opacity:.4;cursor:not-allowed}
.btn{padding:9px 18px;font-size:13px}
.bp{background:var(--ac);color:#0a0c10}
.bd{background:var(--err);color:#fff}
.bs{background:var(--ok);color:#0a0c10}
.bsec{background:var(--bor);color:#dde3ef}
.binf{background:var(--inf);color:#fff}
.bpur{background:var(--pur);color:#fff}
.sm{padding:5px 10px;font-size:11px}
.full{width:100%}
.field{margin-bottom:12px}
.field label{display:block;color:var(--mut);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:#0a0c10;border:1px solid var(--bor);border-radius:6px;padding:9px 11px;color:#dde3ef;font-size:13px;outline:none;box-sizing:border-box;font-family:inherit;-webkit-appearance:none}
.field input[type=number]{-moz-appearance:textfield}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ac)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px}
.ovx{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 9px;color:var(--mut);border-bottom:1px solid var(--bor);font-size:10px;font-weight:700;white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid var(--bor);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.empty{text-align:center;padding:24px;color:var(--mut);font-size:12px}
.tag{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap;display:inline-block}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.mbox{background:var(--card);border:1px solid var(--bor);border-radius:14px;padding:24px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mhdr h3{color:var(--ac);margin:0;font-size:15px;font-weight:800}
.mc{background:none;border:none;color:var(--mut);cursor:pointer;font-size:22px;padding:0;line-height:1}
.divl{display:flex;align-items:center;gap:8px;margin:12px 0 10px}
.divl hr{flex:1;border:none;border-top:1px solid var(--bor)}
.divl span{color:var(--mut);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;white-space:nowrap}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tbtn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;background:var(--card);color:var(--mut);border:none;cursor:pointer;font-family:inherit}
.tbtn.active{background:var(--ok);color:#0a0c10}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:14px}
.pcard{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:14px}
.pcard.low{border-color:var(--err)}
.smini{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center;margin-top:8px}
.scell{background:var(--pan);border-radius:6px;padding:7px 3px}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.gcard{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:18px}
.toast{position:fixed;bottom:22px;right:22px;background:var(--ok);color:#0a0c10;padding:11px 18px;border-radius:9px;font-weight:700;font-size:13px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:9999;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.info-box{background:#3b82f611;border:1px solid #3b82f633;border-radius:8px;padding:9px 13px;font-size:12px;color:#3b82f6;margin-bottom:12px}
.warn-box{background:#f5c84211;border:1px solid #f5c84233;border-radius:8px;padding:9px 13px;font-size:12px;color:var(--ac);margin-bottom:12px}
@media print{
  #sidebar,#topbar,.no-print{display:none!important}
  #main{margin-left:0!important}
  #content{padding:0!important}
  body{background:#fff!important;color:#000!important}
}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sb-logo">
    <div class="n">🏪 KOF-EXPRESS</div>
    <div class="s" id="sb-emp">Cargando...</div>
    <div class="sb-badge">📊 FINANZAS</div>
  </div>
  <nav id="nav">
    <button class="nb active" onclick="irA('resumen')">📊 Resumen</button>
    <button class="nb" onclick="irA('productos')">🏷️ Productos</button>
    <button class="nb" onclick="irA('inventario')">📦 Inventario</button>
    <button class="nb" onclick="irA('gestores')">👥 Gestores</button>
    <button class="nb" onclick="irA('mensajeros')">🛵 Mensajeros</button>
    <button class="nb" onclick="irA('deudas')">💳 Deudas</button>
    <button class="nb" onclick="irA('salarios')">👔 Salarios</button>
    <button class="nb" onclick="irA('gastos')">📉 Gastos</button>
    <button class="nb" onclick="irA('reportes')">📈 Reportes</button>
  </nav>
  <div class="sb-bot">
    <a class="sb-lnk" href="A_Facturacion.html" target="_blank">🧾 Ir a Facturación</a>
    <a class="sb-lnk" href="C_TiendaWeb.html" target="_blank">🌐 Ir a Tienda</a>
    <div style="color:var(--mut);margin-top:4px"><span class="sdot" id="sdot"></span><span id="stxt">Conectando...</span></div>
  </div>
</div>
<div id="main">
  <div id="topbar">
    <button onclick="toggleSide()" style="background:none;border:none;color:var(--mut);font-size:18px;padding:0;cursor:pointer">☰</button>
    <h1 id="ptitle">Resumen</h1>
    <div id="tstats"></div>
  </div>
  <div id="content"><div class="empty">Conectando con Firebase...</div></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue,push,set,update,remove,get}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB={apiKey:"AIzaSyAm0re-tCh5EPaynCHh3AzgiMw_1swREJM",authDomain:"kof-express.firebaseapp.com",databaseURL:"https://kof-express-default-rtdb.firebaseio.com",projectId:"kof-express",storageBucket:"kof-express.firebasestorage.app",messagingSenderId:"846750149946",appId:"1:846750149946:web:c330681d5fee8621c43403"};
const app=initializeApp(FB);
const db=getDatabase(app);

// ── STATE ─────────────────────────────────────────────────────────
let D={empresa:{nombre:'KOF-EXPRESS',ruc:'00042567543',direccion:'SMP_LA HABANA_Tienda ONLINE',tel:'',email:''},tasa:{cup:245,transferPorc:10,zellePorc:2},productos:{},gestores:{},mensajeros:{},facturas:{},deudas:{},salarios:{},gastos:{}};
let MOD='resumen';
let sideOpen=true;

// ── HELPERS ───────────────────────────────────────────────────────
const hoy=()=>new Date().toISOString().split('T')[0];
const usd=n=>'$'+Number(n||0).toFixed(2);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const tag=(t,c)=>`<span class="tag" style="background:${c}22;color:${c}">${t}</span>`;
// KEY FIX: read by ID — forms must use id= not just name=
const fv=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};

function toast(msg,col='#22c55e'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=col;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);
}
function btn(l,cls,oc,sm=false){return `<button class="btn ${cls}${sm?' sm':''}" onclick="${oc}">${l}</button>`;}

function campo(lbl,el,mb=12){
  return `<div class="field" style="margin-bottom:${mb}px"><label>${lbl}</label>${el}</div>`;
}
// FIXED: all inputs get id= AND name= set to same value
function inp(id,val='',tipo='text',ph='',extra=''){
  const step=tipo==='number'?'step="0.01"':'';
  return `<input id="${id}" name="${id}" type="${tipo}" value="${esc(val)}" placeholder="${ph}" ${step} ${extra} autocomplete="off">`;
}
function sel(id,val,opts){
  const o=opts.map(x=>`<option value="${x.v??x}"${(x.v??x)==val?' selected':''}>${x.l??x}</option>`).join('');
  return `<select id="${id}" name="${id}">${o}</select>`;
}
function abrirModal(h){document.body.insertAdjacentHTML('beforeend',h);}
function cerrarModal(id){document.getElementById(id)?.remove();}
function sbox(lbl,val,col,ic=''){return `<div class="sbox"><div class="sl">${ic} ${lbl}</div><div class="sv" style="color:${col}">${val}</div></div>`;}

function tabla(cols,rows,acc){
  if(!rows.length)return '<div class="empty">Sin registros</div>';
  return `<div class="ovx"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}${acc?'<th></th>':''}</tr></thead><tbody>
    ${rows.map((r,i)=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}${acc?`<td><div style="display:flex;gap:4px">${acc(i)}</div></td>`:''}</tr>`).join('')}
  </tbody></table></div>`;
}

// ── FIREBASE LISTENERS ────────────────────────────────────────────
window.toggleSide=()=>{sideOpen=!sideOpen;document.getElementById('sidebar').classList.toggle('closed',!sideOpen);document.getElementById('main').classList.toggle('full',!sideOpen);};

onValue(ref(db,'.info/connected'),s=>{const on=s.val();document.getElementById('sdot').className='sdot'+(on?'':' off');document.getElementById('stxt').textContent=on?'Sincronizado':'Sin conexión';});
onValue(ref(db,'config/empresa'),s=>{if(s.exists()){D.empresa=s.val();document.getElementById('sb-emp').textContent=D.empresa.nombre;}});
onValue(ref(db,'config/tasa'),s=>{if(s.exists())D.tasa=s.val();});
onValue(ref(db,'productos'),s=>{D.productos=s.exists()?s.val():{};if(['productos','inventario','resumen'].includes(MOD))mostrar();topStats();});
onValue(ref(db,'gestores'),s=>{D.gestores=s.exists()?s.val():{};if(['gestores','resumen'].includes(MOD))mostrar();topStats();});
onValue(ref(db,'mensajeros'),s=>{D.mensajeros=s.exists()?s.val():{};if(MOD==='mensajeros')mostrar();});
onValue(ref(db,'facturas'),s=>{D.facturas=s.exists()?s.val():{};if(['resumen','reportes'].includes(MOD))mostrar();topStats();});
onValue(ref(db,'deudas'),s=>{D.deudas=s.exists()?s.val():{};if(MOD==='deudas')mostrar();topStats();});
onValue(ref(db,'salarios'),s=>{D.salarios=s.exists()?s.val():{};if(MOD==='salarios')mostrar();topStats();});
onValue(ref(db,'gastos'),s=>{D.gastos=s.exists()?s.val():{};if(MOD==='gastos')mostrar();topStats();});

const MODS=['resumen','productos','inventario','gestores','mensajeros','deudas','salarios','gastos','reportes'];
window.irA=function(id){
  MOD=id;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick')?.includes(`'${id}'`)));
  const labels={resumen:'Resumen',productos:'Productos',inventario:'Inventario',gestores:'Gestores',mensajeros:'Mensajeros',deudas:'Deudas',salarios:'Salarios',gastos:'Gastos',reportes:'Reportes'};
  document.getElementById('ptitle').textContent=labels[id]||id;
  mostrar();
};

function calcGan(){
  const tv=Object.values(D.facturas).reduce((s,f)=>s+(f.totalUSD||0),0);
  const tc=Object.values(D.facturas).reduce((s,f)=>s+(f.comisiones||0),0);
  const ts=Object.values(D.salarios).filter(x=>!x.pagado).reduce((s,x)=>s+(x.monto||0),0);
  const tg=Object.values(D.gastos).filter(x=>!x.pagado).reduce((s,x)=>s+(x.monto||0),0);
  const td=Object.values(D.deudas).filter(x=>!x.pagada).reduce((s,x)=>s+(x.monto||0),0);
  return{tv,tc,ts,tg,td,ganN:tv-tc-ts-tg};
}

function topStats(){
  const{tv,ganN}=calcGan();
  const stock=Object.values(D.productos).filter(p=>p.tipo!=='combo').reduce((s,p)=>s+(p.almacen||0)+(p.tienda||0),0);
  document.getElementById('tstats').innerHTML=
    `<div class="tstat">💵 <b style="color:var(--ok)">${usd(tv)}</b></div>`+
    `<div class="tstat">📦 <b style="color:var(--inf)">${stock}</b> uds</div>`+
    `<div class="tstat" style="border-color:${ganN>=0?'var(--ok)':'var(--err)'}">📈 <b style="color:${ganN>=0?'var(--ok)':'var(--err)'}">${usd(ganN)}</b></div>`;
}

function mostrar(){
  const pages={resumen:pResumen,productos:pProductos,inventario:pInventario,gestores:pGestores,mensajeros:pMensajeros,deudas:pDeudas,salarios:pSalarios,gastos:pGastos,reportes:pReportes};
  document.getElementById('content').innerHTML=(pages[MOD]||pResumen)();
}

// ══════════════════════════════════════════════════════
// RESUMEN
// ══════════════════════════════════════════════════════
function pResumen(){
  const{tv,tc,ts,tg,td,ganN}=calcGan();
  let h=`<div class="phdr"><div><h2>Resumen Financiero</h2><p>Datos en tiempo real desde Firebase</p></div>
    <button class="btn bp no-print" onclick="imprimirReporte()">🖨 Imprimir Reporte</button></div>`;
  h+=`<div class="stats">${sbox('Ventas USD',usd(tv),'#22c55e','💵')}${sbox('Comisiones',usd(tc),'#f97316','💸')}${sbox('Deudas',usd(td),'#ef4444','💳')}${sbox('Salarios',usd(ts),'#a855f7','👔')}${sbox('Gastos',usd(tg),'#ef4444','📉')}</div>`;
  h+=`<div class="card"><div style="font-weight:700;margin-bottom:14px">📈 Cálculo de Ganancias</div>`;
  [['Ventas brutas',tv,'#22c55e'],['− Comisiones gestores',tc,'#f97316'],['= Ganancia bruta',tv-tc,'#14b8a6'],['− Salarios pendientes',ts,'#a855f7'],['− Gastos pendientes',tg,'#ef4444']].forEach(([l,v,c])=>{
    h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bor)"><span style="color:var(--mut);font-size:13px">${l}</span><span style="color:${c};font-weight:700">${usd(v)}</span></div>`;
  });
  h+=`<div style="display:flex;justify-content:space-between;padding:10px 0;border-top:2px solid var(--bor);margin-top:4px"><span style="font-size:15px;font-weight:800">= GANANCIA NETA</span><span style="color:${ganN>=0?'#22c55e':'#ef4444'};font-weight:900;font-size:22px">${usd(ganN)}</span></div>`;
  h+=`<div style="margin-top:10px;background:var(--pan);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--mut)">Equivalente en CUP (tasa ${D.tasa.cup}): <b style="color:#f97316">${Math.round(ganN*D.tasa.cup).toLocaleString()} CUP</b></div></div>`;
  const ultFacs=Object.values(D.facturas).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).slice(0,5);
  h+=`<div class="card"><div style="font-weight:700;margin-bottom:12px">🧾 Últimas Facturas</div>`;
  if(!ultFacs.length)h+='<div class="empty">Sin facturas aún</div>';
  ultFacs.forEach(f=>{h+=`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bor)"><div><b style="color:var(--ac)">${esc(f.numero||'—')}</b> <span style="color:#dde3ef;font-size:13px">${esc(f.clienteNombre||'—')}</span><div style="color:var(--mut);font-size:11px">${f.fecha||''} · ${tag(f.estado||'Pendiente',f.estado==='Pagada'?'#22c55e':'#f97316')}</div></div><b style="color:var(--ok)">${usd(f.totalUSD)}</b></div>`;});
  h+='</div>';
  return h;
}

window.imprimirReporte=function(){
  const{tv,tc,ts,tg,ganN}=calcGan();
  const facs=Object.values(D.facturas);
  const gest=Object.values(D.gestores);
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Reporte ${hoy()}</title>
  <style>body{font-family:Arial,sans-serif;padding:24px;color:#111}h1{font-size:18px;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}th,td{border:1px solid #ccc;padding:6px 9px;text-align:left}th{background:#f0f0f0;font-weight:700}.total{font-weight:900;font-size:14px;border-top:2px solid #000;margin-top:8px}.ok{color:#22c55e}.err{color:#ef4444}</style></head><body>
  <h1>KOF-EXPRESS — Reporte del Día ${hoy()}</h1>
  <table><tr><th>Concepto</th><th>USD</th></tr>
  <tr><td>Ventas brutas</td><td>$${tv.toFixed(2)}</td></tr>
  <tr><td>Comisiones gestores</td><td>$${tc.toFixed(2)}</td></tr>
  <tr><td>Salarios pendientes</td><td>$${ts.toFixed(2)}</td></tr>
  <tr><td>Gastos pendientes</td><td>$${tg.toFixed(2)}</td></tr>
  <tr class="total"><td><b>GANANCIA NETA</b></td><td><b class="${ganN>=0?'ok':'err'}">$${ganN.toFixed(2)}</b></td></tr>
  </table>
  <table><tr><th>Facturas del día</th><th>Cliente</th><th>Gestor</th><th>Total USD</th><th>Estado</th></tr>
  ${facs.filter(f=>f.fecha===hoy()).map(f=>`<tr><td>${esc(f.numero||'')}</td><td>${esc(f.clienteNombre||'')}</td><td>${esc(f.gestorId||'')}</td><td>$${Number(f.totalUSD||0).toFixed(2)}</td><td>${f.estado||''}</td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:#999">Sin facturas hoy</td></tr>'}
  </table>
  <p style="font-size:11px;color:#888;text-align:center">KOF-EXPRESS · Impreso el ${new Date().toLocaleString()}</p>
  </body></html>`);
  w.document.close();w.print();
};

// ══════════════════════════════════════════════════════
// PRODUCTOS
// ══════════════════════════════════════════════════════
function pProductos(){
  const prods=Object.entries(D.productos).map(([k,v])=>({...v,_k:k}));
  let h=`<div class="phdr"><div><h2>Catálogo de Productos</h2><p>Los productos se sincronizan con Facturación y la Tienda Web</p></div>
    <div style="display:flex;gap:8px">${btn('+ Producto','bp','abrirProd(null)')} ${btn('+ Combo','btn bpur','abrirCombo(null)')}</div></div>`;
  h+=`<div class="info-box">💡 Cada producto que añadas aparece automáticamente en Facturación y en la Tienda Web para los clientes.</div>`;
  const cols=['Tipo','Código','Nombre','U/M','Costo','Comisión','Ganancia','Precio Venta','Almacén','Tienda'];
  const rows=prods.map(p=>[
    p.tipo==='combo'?tag('COMBO','#a855f7'):tag('simple','#4e5a70'),
    `<b style="color:var(--ac)">${esc(p.codigo||'')}</b>`,esc(p.nombre||''),esc(p.unidad||'Unidad'),
    `<span style="color:var(--inf)">${usd(p.costo||0)}</span>`,
    `<span style="color:var(--cup)">${usd(p.comisionFija||0)}</span>`,
    `<span style="color:#14b8a6">${usd(p.ganancia||0)}</span>`,
    `<b style="color:var(--ac)">${usd(p.precio||0)}</b>`,
    `<b style="color:var(--inf)">${p.almacen||0}</b>`,
    `<b style="color:var(--ok)">${p.tienda||0}</b>`
  ]);
  h+=`<div class="card">${tabla(cols,rows,i=>`${btn('✏','bsec',`abrirProd('${prods[i]._k}')`,true)} ${btn('✕','bd',`elimProd('${prods[i]._k}')`,true)}`)}</div>`;
  return h;
}

window.abrirProd=function(key){
  const p=key&&D.productos[key]?D.productos[key]:null;
  const calc=(p?.costo||0)+(p?.comisionFija||0)+(p?.ganancia||0);
  const h=`<div class="mbg" id="m-prod"><div class="mbox">
    <div class="mhdr"><h3>${p?'Editar Producto':'Nuevo Producto'}</h3><button class="mc" onclick="cerrarModal('m-prod')">✕</button></div>
    <div class="g2">${campo('Código',inp('f-pCod',p?.codigo||'','text','VES-001'))} ${campo('Unidad',sel('f-pUnid',p?.unidad||'Unidad',['Unidad','Par','Caja','Docena','Kg','Litro','Metro','Paquete','Rollo']))}</div>
    ${campo('Nombre del Producto',inp('f-pNom',p?.nombre||'','text','Ej: Vestido Azul Talla M'))}
    <div class="divl"><hr><span>Precio (USD)</span><hr></div>
    <div class="g3">${campo('Costo ($)',inp('f-pCosto',p?.costo||0,'number'))} ${campo('Comisión ($)',inp('f-pCom',p?.comisionFija||0,'number'))} ${campo('Ganancia ($)',inp('f-pGan',p?.ganancia||0,'number'))}</div>
    <div style="background:var(--pan);border-radius:8px;padding:10px 13px;display:flex;justify-content:space-between;margin-bottom:12px">
      <span style="color:var(--mut);font-size:12px">Precio calculado</span>
      <span id="f-pCalc" style="color:var(--ac);font-weight:900;font-size:16px">${usd(calc)}</span>
    </div>
    ${campo('Precio Final de Venta ($)',inp('f-pPrecio',p?.precio||calc,'number'))}
    <div class="divl"><hr><span>Stock Inicial</span><hr></div>
    <div class="g2">${campo('Stock Almacén',inp('f-pAlm',p?.almacen||0,'number'))} ${campo('Stock Tienda',inp('f-pTda',p?.tienda||0,'number'))}</div>
    ${campo('Descripción para Tienda Web',`<textarea id="f-pDesc" name="f-pDesc" rows="3" style="width:100%;background:#0a0c10;border:1px solid var(--bor);border-radius:6px;padding:9px 11px;color:#dde3ef;font-size:13px;outline:none;resize:vertical;font-family:inherit;box-sizing:border-box" placeholder="Describe el producto para que los clientes lo vean...">${esc(p?.descripcion||'')}</textarea>`)}
    ${campo('URL de Imagen (opcional)',inp('f-pImg',p?.imagen||'','text','https://...'))}
    ${btn('💾 Guardar Producto','bp full',`guardarProd('${key||''}')`)}</div></div>`;
  abrirModal(h);
  // Live price calc
  ['f-pCosto','f-pCom','f-pGan'].forEach(id=>{
    setTimeout(()=>{
      document.getElementById(id)?.addEventListener('input',()=>{
        const c=+fv('f-pCosto'),cm=+fv('f-pCom'),g=+fv('f-pGan'),tot=c+cm+g;
        const pc=document.getElementById('f-pCalc');if(pc)pc.textContent=usd(tot);
        const pr=document.getElementById('f-pPrecio');if(pr)pr.value=tot.toFixed(2);
      });
    },50);
  });
};

window.guardarProd=async function(key){
  const codigo=fv('f-pCod');
  const nombre=fv('f-pNom');
  if(!codigo||!nombre){toast('Código y Nombre son obligatorios','#ef4444');return;}
  const item={
    tipo:'simple',
    codigo,nombre,
    unidad:fv('f-pUnid')||'Unidad',
    costo:parseFloat(fv('f-pCosto'))||0,
    comisionFija:parseFloat(fv('f-pCom'))||0,
    ganancia:parseFloat(fv('f-pGan'))||0,
    precio:parseFloat(fv('f-pPrecio'))||0,
    almacen:parseInt(fv('f-pAlm'))||0,
    tienda:parseInt(fv('f-pTda'))||0,
    descripcion:document.getElementById('f-pDesc')?.value.trim()||'',
    imagen:fv('f-pImg')||'',
    activo:true,
    actualizado:Date.now()
  };
  console.log('Guardando producto:', item); // debug
  try{
    if(key)await update(ref(db,'productos/'+key),item);
    else await push(ref(db,'productos'),item);
    toast('✅ Producto guardado correctamente');
    cerrarModal('m-prod');
  }catch(e){toast('Error: '+e.message,'#ef4444');console.error(e);}
};

window.elimProd=async function(key){if(!confirm('¿Eliminar producto?'))return;await remove(ref(db,'productos/'+key));toast('Producto eliminado');};

// COMBOS
let comboComps=[];

    <div class="mhdr"><h3>${p?'Editar Combo':'Nuevo Combo'}</h3><button class="mc" onclick="cerrarModal('m-combo')">✕</button></div>
    <div class="warn-box">Un combo agrupa varios productos a precio especial. Al vender un combo se descuentan sus componentes del inventario.</div>
    <div class="g2">${campo('Código',inp('f-cCod',p?.codigo||'','text','CMB-001'))} ${campo('Nombre del Combo',inp('f-cNom',p?.nombre||''))}</div>
    <div class="divl"><hr><span>Componentes</span><hr></div>
    <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:10px">
      <div style="flex:3">${campo('Producto',sel('f-cAdd','',simples),0)}</div>
      <div style="flex:1">${campo('Cant.',inp('f-cCant',1,'number'),0)}</div>
      <div>${btn('+ Añadir','bp','addCompCombo()',true)}</div>
    </div>
    <div id="combo-comp-lista"></div>
    <div class="divl"><hr><span>Precio del Combo (USD)</span><hr></div>
    <div class="g3">${campo('Costo ($)',inp('f-cCosto',p?.costo||0,'number'))} ${campo('Comisión ($)',inp('f-cCom',p?.comisionFija||0,'number'))} ${campo('Ganancia ($)',inp('f-cGan',p?.ganancia||0,'number'))}</div>
    ${campo('Precio Final ($)',inp('f-cPrecio',p?.precio||0,'number'))}
    ${campo('Descripción',`<textarea id="f-cDesc" name="f-cDesc" rows="2" style="width:100%;background:#0a0c10;border:1px solid var(--bor);border-radius:6px;padding:9px;color:#dde3ef;font-size:13px;outline:none;resize:vertical;font-family:inherit;box-sizing:border-box">${esc(p?.descripcion||'')}</textarea>`)}
    ${btn('💾 Guardar Combo','bpur full',`guardarCombo('${key||''}')`)}</div></div>`;
  abrirModal(h);
  renderComboComps();
};

window.addCompCombo=function(){
  const pid=fv('f-cAdd'),cant=parseInt(fv('f-cCant'))||1;
  if(!pid){toast('Selecciona un producto','#f97316');return;}
  const ex=comboComps.find(c=>c.pid===pid);
  if(ex)ex.cant+=cant;else comboComps.push({pid,cant});
  renderComboComps();
};
window.quitarCompCombo=function(i){comboComps.splice(i,1);renderComboComps();};
function renderComboComps(){
  const el=document.getElementById('combo-comp-lista');if(!el)return;
  if(!comboComps.length){el.innerHTML='<div class="empty">Sin componentes — añade productos al combo</div>';return;}
  el.innerHTML=`<div class="card" style="padding:12px;margin-bottom:10px">${comboComps.map((c,i)=>{
    const p=D.productos[c.pid];
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bor)">
      <span>${p?esc(p.nombre):'—'} <b style="color:var(--pur)">×${c.cant}</b></span>
      ${btn('✕','bd',`quitarCompCombo(${i})`,true)}</div>`;
  }).join('')}</div>`;
}
window.guardarCombo=async function(key){
  if(!comboComps.length){toast('Añade al menos un componente','#f97316');return;}
  const codigo=fv('f-cCod'),nombre=fv('f-cNom');
  if(!codigo||!nombre){toast('Código y Nombre obligatorios','#ef4444');return;}
  const item={tipo:'combo',codigo,nombre,unidad:'Combo',costo:parseFloat(fv('f-cCosto'))||0,comisionFija:parseFloat(fv('f-cCom'))||0,ganancia:parseFloat(fv('f-cGan'))||0,precio:parseFloat(fv('f-cPrecio'))||0,almacen:0,tienda:0,componentes:comboComps.slice(),descripcion:document.getElementById('f-cDesc')?.value.trim()||'',activo:true};
  try{
    if(key)await update(ref(db,'productos/'+key),item);
    else await push(ref(db,'productos'),item);
    toast('✅ Combo guardado');cerrarModal('m-combo');
  }catch(e){toast('Error: '+e.message,'#ef4444');}
};

        <div class="scell"><div style="color:var(--mut);font-size:9px">🏪 Tienda</div><div style="color:var(--ok);font-weight:800;font-size:18px">${p.tienda||0}</div></div>

    </div>`;
  });
  h+='</div>';

}

window.abrirMovInv=function(){
  const simples=Object.entries(D.productos).filter(([k,v])=>v.tipo!=='combo').map(([k,v])=>({v:k,l:v.codigo+' · '+v.nombre+' (Alm:'+(v.almacen||0)+' Tda:'+(v.tienda||0)+')'}));
  const h=`<div class="mbg" id="m-inv"><div class="mbox">
    <div class="mhdr"><h3>Nuevo Movimiento de Inventario</h3><button class="mc" onclick="cerrarModal('m-inv')">✕</button></div>
    <div class="g2">${campo('Fecha',inp('f-mFecha',hoy(),'date'))} ${campo('Tipo',sel('f-mTipo','Entrada',['Entrada','Salida','Almacén→Tienda','Tienda→Almacén']))}</div>
    ${campo('Producto',sel('f-mProd','',simples))}
    ${campo('Cantidad',inp('f-mCant',1,'number'))}
    ${campo('Motivo',inp('f-mMotivo','','text','Compra, ajuste, devolución...'))}
    ${campo('Origen / Proveedor',inp('f-mOrigen',''))}
    ${btn('💾 Guardar Movimiento','bp full','guardarMovInv()')}</div></div>`;
  abrirModal(h);
};

window.guardarMovInv=async function(){
  const cant=parseInt(fv('f-mCant'))||0;
  const pkey=fv('f-mProd');
  const tipo=fv('f-mTipo');
  if(!pkey){toast('Selecciona un producto','#f97316');return;}
  if(!cant){toast('Ingresa la cantidad','#f97316');return;}
  const p=D.productos[pkey];
  if(!p){toast('Producto no encontrado','#ef4444');return;}
  let al=p.almacen||0,ti=p.tienda||0;
  if(tipo==='Entrada')al+=cant;
  else if(tipo==='Salida')al=Math.max(0,al-cant);
  else if(tipo==='Almacén→Tienda'){al=Math.max(0,al-cant);ti+=cant;}
  else if(tipo==='Tienda→Almacén'){ti=Math.max(0,ti-cant);al+=cant;}
  try{
    await update(ref(db,'productos/'+pkey),{almacen:al,tienda:ti});
    toast('✅ Inventario actualizado');cerrarModal('m-inv');
  }catch(e){toast('Error: '+e.message,'#ef4444');}
};

function pGestores(){
  const gs=Object.entries(D.gestores).map(([k,v])=>({...v,_k:k}));
  const comGs=gs.map(g=>{
    const fs=Object.values(D.facturas).filter(f=>f.gestorId===g.codigo);
    return{...g,tv:fs.reduce((s,f)=>s+(f.totalUSD||0),0),tc:fs.reduce((s,f)=>s+(f.comisiones||0),0),nf:fs.length};
  });
  const totPend=comGs.reduce((s,g)=>s+(g.tc||0),0);
  let h=`<div class="phdr"><div><h2>Gestores Comerciales</h2><p>Comisiones calculadas automáticamente · Los gestores acceden con su código desde el celular</p></div>
    ${btn('+ Nuevo Gestor','bp','abrirGestor(null)')}</div>`;
  h+=`<div class="stats">${sbox('Total Comisiones a Pagar',usd(totPend),'#f97316','💸')} ${sbox('Vendido Total',usd(comGs.reduce((s,g)=>s+g.tv,0)),'#22c55e','📈')} ${sbox('Gestores Activos',gs.filter(g=>g.activo!==false).length,'#3b82f6','👥')}</div>`;
  if(!comGs.length){h+='<div class="empty">Sin gestores. Añade el primero.</div>';return h;}
  h+='<div class="ggrid">';
  comGs.forEach(g=>{
    const tcol=g.pago==='Semanal'?'#3b82f6':g.pago==='Mensual'?'#a855f7':'#f97316';
    h+=`<div class="gcard">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div><b style="color:var(--ac);font-size:15px">${esc(g.nombre||'')}</b><div style="color:var(--mut);font-size:11px">${esc(g.codigo||'')} · ${tag(g.pago||'—',tcol)}</div></div>
        ${g.pagado?tag('PAGADO','#22c55e'):''}
      </div>
      <div style="background:var(--pan);border-radius:8px;padding:10px;margin-bottom:10px">
        <div style="color:var(--mut);font-size:9px;font-weight:700;margin-bottom:7px">RESUMEN DE VENTAS</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center">
          <div style="background:#0a0c10;border-radius:5px;padding:7px"><div style="color:var(--mut);font-size:9px">Facturas</div><div style="color:#dde3ef;font-weight:800;font-size:14px">${g.nf}</div></div>
          <div style="background:#0a0c10;border-radius:5px;padding:7px"><div style="color:var(--mut);font-size:9px">Vendido</div><div style="color:var(--ok);font-weight:800;font-size:13px">${usd(g.tv)}</div></div>
          <div style="background:#0a0c10;border-radius:5px;padding:7px"><div style="color:var(--mut);font-size:9px">Comisión</div><div style="color:var(--cup);font-weight:800;font-size:15px">${usd(g.tc)}</div></div>
        </div>
      </div>
      <div style="display:grid;gap:4px;font-size:12px;margin-bottom:12px">
        <div>📱 <span style="color:#dde3ef">${esc(g.tel||'—')}</span></div>
        <div>🏠 <span style="color:#dde3ef">${esc(g.dir||'—')}</span></div>
        <div>🪪 <span style="color:#dde3ef">${esc(g.carnet||'—')}</span></div>
        <div>💳 <span style="color:#dde3ef">${esc(g.tarjeta||'—')}</span></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${btn('✏','bsec',`abrirGestor('${g._k}')`,true)}
        ${btn('📋 Ver Facturas','binf',`verFacsGestor('${g._k}')`,true)}
        ${btn(g.pagado?'↩ Reabrir':'✅ Marcar Pagado',g.pagado?'bsec':'bs',`pagarComision('${g._k}')`,true)}
        ${btn('✕','bd',`elimGestor('${g._k}')`,true)}
      </div>
    </div>`;
  });
  h+='</div>';
  return h;
}

window.abrirGestor=function(key){
  const g=key&&D.gestores[key]?D.gestores[key]:null;
  // Auto-generate next code
  const nextCod=g?g.codigo:(()=>{const nums=Object.values(D.gestores).map(x=>parseInt((x.codigo||'G-000').replace(/\D/g,''))||0);return 'G-'+String(Math.max(0,...nums)+1).padStart(3,'0');})();
  const h=`<div class="mbg" id="m-gest"><div class="mbox">
    <div class="mhdr"><h3>${g?'Editar Gestor':'Nuevo Gestor'}</h3><button class="mc" onclick="cerrarModal('m-gest')">✕</button></div>
    <div class="info-box">El gestor usa su <b>Código</b> para acceder a la app desde su teléfono y enviar vales.</div>
    <div class="g2">${campo('Código (automático)',inp('f-gCod',nextCod,'text','G-001'))} ${campo('Nombre Completo',inp('f-gNom',g?.nombre||''))}</div>
    <div class="g2">${campo('Teléfono',inp('f-gTel',g?.tel||''))} ${campo('# Carnet de Identidad',inp('f-gCarnet',g?.carnet||''))}</div>
    ${campo('Dirección donde vive',inp('f-gDir',g?.dir||''))}
    ${campo('Tarjeta para recibir pago de comisiones',inp('f-gTarjeta',g?.tarjeta||'','text','9208-xxxx-xxxx-0000'))}
    ${campo('Frecuencia de pago de comisión',sel('f-gPago',g?.pago||'Semanal',['Semanal','Mensual','Por venta']))}
    ${btn('💾 Guardar Gestor','bp full',`guardarGestor('${key||''}')`)}</div></div>`;
  abrirModal(h);
};

window.guardarGestor=async function(key){
  const nombre=fv('f-gNom'),codigo=fv('f-gCod');
  if(!nombre||!codigo){toast('Nombre y Código son obligatorios','#ef4444');return;}
  const item={codigo,nombre,tel:fv('f-gTel'),carnet:fv('f-gCarnet'),dir:fv('f-gDir'),tarjeta:fv('f-gTarjeta'),pago:fv('f-gPago'),activo:true,pagado:false};
  console.log('Guardando gestor:', item);
  try{
    if(key)await update(ref(db,'gestores/'+key),item);
    else await push(ref(db,'gestores'),item);
    toast('✅ Gestor guardado correctamente');cerrarModal('m-gest');
  }catch(e){toast('Error: '+e.message,'#ef4444');console.error(e);}
};

window.pagarComision=async function(key){
  const g=D.gestores[key];if(!g)return;
  const nuevo=!g.pagado;
  if(nuevo&&!confirm(`¿Marcar comisiones de ${g.nombre} como PAGADAS?\nEsto reiniciará su contador a cero para el siguiente período.`))return;
  await update(ref(db,'gestores/'+key),{pagado:nuevo,ultimoPago:nuevo?hoy():null});
  toast(nuevo?`✅ Comisiones de ${g.nombre} marcadas como pagadas`:`↩ ${g.nombre} reabierto`);
};

window.verFacsGestor=function(key){
  const g=D.gestores[key];if(!g)return;
  const fs=Object.values(D.facturas).filter(f=>f.gestorId===g.codigo);
  const tv=fs.reduce((s,f)=>s+(f.totalUSD||0),0);
  const tc=fs.reduce((s,f)=>s+(f.comisiones||0),0);
  const h=`<div class="mbg" id="m-gfac"><div class="mbox" style="max-width:700px">
    <div class="mhdr"><h3>Facturas de ${esc(g.nombre)}</h3><button class="mc" onclick="cerrarModal('m-gfac')">✕</button></div>
    <div class="stats">${sbox('Vendido',usd(tv),'#22c55e','💵')} ${sbox('Comisión Total',usd(tc),'#f97316','💸')} ${sbox('Facturas',fs.length,'#3b82f6','🧾')}</div>
    ${tabla(['N°','Fecha','Cliente','Total USD','Comisión','Estado'],fs.map(f=>[esc(f.numero||'—'),f.fecha||'',esc(f.clienteNombre||''),`<b style="color:var(--ok)">${usd(f.totalUSD)}</b>`,`<b style="color:var(--cup)">${usd(f.comisiones)}</b>`,tag(f.estado||'Pendiente',f.estado==='Pagada'?'#22c55e':'#f97316')]))}
    <div style="margin-top:14px">${btn('Imprimir Reporte','bp','imprimirReporteGestor(\''+key+'\')')} ${btn('Cerrar','bsec','cerrarModal(\'m-gfac\')')}</div></div></div>`;

window.imprimirReporteGestor=function(key){
  const g=D.gestores[key];if(!g)return;
  const fs=Object.values(D.facturas).filter(f=>f.gestorId===g.codigo);
  const tv=fs.reduce((s,f)=>s+(f.totalUSD||0),0);
  const tc=fs.reduce((s,f)=>s+(f.comisiones||0),0);
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Reporte ${g.nombre}</title>
  <style>body{font-family:Arial,sans-serif;padding:24px;color:#111}h1{font-size:16px;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #ccc;padding:6px;text-align:left}th{background:#f0f0f0}.tot{font-weight:900;border-top:2px solid #000}</style></head><body>
  <h1>KOF-EXPRESS — Reporte Gestor: ${g.nombre} (${g.codigo})</h1>
  <p>Período: ${g.ultimoPago?'Desde '+g.ultimoPago:'Acumulado'} · Generado: ${hoy()}</p>
  <p><b>Tarjeta de pago:</b> ${g.tarjeta||'—'} · <b>Frecuencia:</b> ${g.pago||'—'}</p>
  <br>
  <table><tr><th>Factura</th><th>Fecha</th><th>Cliente</th><th>Total USD</th><th>Comisión</th><th>Estado</th></tr>
  ${fs.map(f=>`<tr><td>${f.numero||''}</td><td>${f.fecha||''}</td><td>${f.clienteNombre||''}</td><td>$${(f.totalUSD||0).toFixed(2)}</td><td>$${(f.comisiones||0).toFixed(2)}</td><td>${f.estado||''}</td></tr>`).join('')}
  <tr class="tot"><td colspan="3"><b>TOTAL</b></td><td><b>$${tv.toFixed(2)}</b></td><td><b>$${tc.toFixed(2)}</b></td><td></td></tr>
  </table>
  <br><p style="font-size:11px;color:#888">KOF-EXPRESS · Reporte impreso el ${new Date().toLocaleString()}</p>
  </body></html>`);
  w.document.close();w.print();
};

window.abrirMensajero=function(key){
  const m=key&&D.mensajeros[key]?D.mensajeros[key]:null;

window.guardarMensajero=async function(key){
  const nombre=fv('f-mNom');
  if(!nombre){toast('El nombre es obligatorio','#ef4444');return;}
  const nuevoFondo=parseFloat(fv('f-mFondo'))||0;
  const fondoAnt=key&&D.mensajeros[key]?D.mensajeros[key].fondo||0:0;
  const item={nombre,tel:fv('f-mTel'),fondo:nuevoFondo,obs:document.getElementById('f-mObs')?.value.trim()||''};
  console.log('Guardando mensajero:', item);
  try{
    if(key)await update(ref(db,'mensajeros/'+key),item);
    else await push(ref(db,'mensajeros'),item);
    const diff=nuevoFondo-fondoAnt;
    if(diff!==0){await push(ref(db,'gastos'),{concepto:(diff>0?'Fondo asignado':'Recuperación fondo')+' mensajero: '+nombre,monto:Math.abs(diff),categoria:'Fondo Mensajero',fecha:hoy(),pagado:true,timestamp:Date.now()});}
    toast('✅ Mensajero guardado');cerrarModal('m-mens');
  }catch(e){toast('Error: '+e.message,'#ef4444');console.error(e);}
};

// ══════════════════════════════════════════════════════
// REPORTES
// ══════════════════════════════════════════════════════
function pReportes(){
  const facs=Object.values(D.facturas);
  const ventas={};
  facs.forEach(f=>(f.items||[]).forEach(it=>{ventas[it.codigo]=ventas[it.codigo]||{codigo:it.codigo,nombre:it.nombre,units:0,total:0};ventas[it.codigo].units+=(it.cant||1);ventas[it.codigo].total+=(it.precio||0)*(it.cant||1);}));
  const topProds=Object.values(ventas).sort((a,b)=>b.total-a.total).slice(0,10);
  const porGest={};
  facs.forEach(f=>{const k=f.gestorId||'Sin gestor';porGest[k]=porGest[k]||{gestor:k,n:0,total:0,com:0};porGest[k].n++;porGest[k].total+=(f.totalUSD||0);porGest[k].com+=(f.comisiones||0);});
  const byGest=Object.values(porGest).sort((a,b)=>b.total-a.total);
  const bajos=Object.values(D.productos).filter(p=>(p.almacen||0)+(p.tienda||0)<5);
  const gs=Object.entries(D.gestores).map(([k,v])=>({...v,_k:k}));
  let h=`<div class="phdr"><div><h2>Reportes y Análisis</h2></div>
    <button class="btn bp" onclick="imprimirReporte()">🖨 Imprimir Reporte</button></div>`;
  h+=`<div class="card"><b style="display:block;margin-bottom:12px">🏆 Top Productos Más Vendidos</b>${!topProds.length?'<div class="empty">Sin ventas aún</div>':tabla(['Código','Producto','Uds.','Total USD'],topProds.map(p=>[`<b style="color:var(--ac)">${esc(p.codigo)}</b>`,esc(p.nombre),`<b style="color:var(--inf)">${p.units}</b>`,`<b style="color:var(--ok)">${usd(p.total)}</b>`]))}</div>`;
  h+=`<div class="card"><b style="display:block;margin-bottom:12px">💸 Comisiones por Gestor (pendientes de pago)</b>
    ${!byGest.length?'<div class="empty">Sin ventas aún</div>':tabla(['Gestor','Facturas','Vendido','Comisión','Estado'],gs.map(g=>{const d=porGest[g.codigo]||{n:0,total:0,com:0};return[esc(g.nombre),d.n,`<b style="color:var(--ok)">${usd(d.total)}</b>`,`<b style="color:var(--cup)">${usd(d.com)}</b>`,tag(g.pagado?'Pagado':'Pendiente',g.pagado?'#22c55e':'#f97316')];}),i=>`${btn('💾 Pagar','bs',`pagarComision('${gs[i]._k}')`,true)}`)}</div>`;
  h+=`<div class="card"><b style="display:block;margin-bottom:12px">⚠️ Stock Bajo (menos de 5 unidades)</b>${!bajos.length?'<div class="empty" style="color:var(--ok)">✅ Todo el stock está bien</div>':tabla(['Código','Nombre','Almacén','Tienda','Total'],bajos.map(p=>[`<b style="color:var(--ac)">${esc(p.codigo||'')}</b>`,esc(p.nombre||''),`<b style="color:var(--err)">${p.almacen||0}</b>`,`<b style="color:var(--err)">${p.tienda||0}</b>`,`<b style="color:var(--err)">${(p.almacen||0)+(p.tienda||0)}</b>`]))}</div>`;
  return h;
}
