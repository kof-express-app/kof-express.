<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOF-EXPRESS — Finanzas e Inventario</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0c10;color:#dde3ef;min-height:100vh}
:root{--ac:#f5c842;--bg:#0a0c10;--pan:#111520;--card:#171e2b;--bor:#1f2a3d;--mut:#4e5a70;--ok:#22c55e;--err:#ef4444;--inf:#3b82f6;--cup:#f97316;--pur:#a855f7;--teal:#14b8a6}
#sidebar{width:200px;background:#0d1017;border-right:1px solid var(--bor);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow:hidden}
#sidebar.closed{width:0}
.sb-logo{padding:18px 14px 12px}
.sb-logo .n{color:var(--ac);font-weight:900;font-size:14px;letter-spacing:1px}
.sb-logo .s{color:var(--mut);font-size:10px;margin-top:2px}
.sb-logo .mod-badge{background:#22c55e22;border:1px solid #22c55e44;border-radius:5px;padding:2px 8px;font-size:9px;color:var(--ok);font-weight:700;margin-top:6px;display:inline-block}
nav{flex:1;padding:4px 8px}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--mut);cursor:pointer;font-size:13px;font-weight:500;margin-bottom:2px;text-align:left;font-family:inherit}
.nb:hover{background:rgba(34,197,94,.08);color:#dde3ef}
.nb.active{background:var(--ok);color:#0a0c10;font-weight:800}
.sb-bottom{padding:10px 14px;border-top:1px solid var(--bor);font-size:10px;color:var(--mut)}
.sb-link{display:block;background:#3b82f611;border:1px solid #3b82f633;border-radius:6px;padding:7px 10px;color:#3b82f6;font-size:11px;font-weight:700;text-decoration:none;margin-bottom:6px;text-align:center}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
.sync-dot.off{background:var(--err);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#main{margin-left:200px;display:flex;flex-direction:column;min-height:100vh;transition:margin .2s}
#main.full{margin-left:0}
#topbar{background:#111520;border-bottom:1px solid var(--bor);padding:10px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:40}
#topbar h1{font-size:15px;font-weight:700;margin:0}
#tstats{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap}
.tstat{background:var(--card);border:1px solid var(--bor);border-radius:6px;padding:4px 10px;font-size:11px}
#content{flex:1;padding:20px;overflow-y:auto}
.phdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.phdr h2{color:var(--ac);margin:0;font-size:18px}
.phdr p{color:var(--mut);font-size:11px;margin:3px 0 0}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.sbox{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:14px 16px;flex:1;min-width:110px}
.sbox .sl{color:var(--mut);font-size:10px;margin-bottom:3px}
.sbox .sv{font-size:20px;font-weight:800;line-height:1.1}
.card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:18px;margin-bottom:14px}
.ctitle{font-weight:700;margin-bottom:12px;font-size:13px}
button{cursor:pointer;border:none;border-radius:7px;font-family:inherit;font-weight:700;transition:opacity .15s}
button:hover{opacity:.85}
button:disabled{opacity:.4;cursor:not-allowed}
.btn{padding:9px 18px;font-size:13px}
.bp{background:var(--ac);color:#0a0c10}
.bd{background:var(--err);color:#fff}
.bs{background:var(--ok);color:#0a0c10}
.bsec{background:var(--bor);color:#dde3ef}
.sm{padding:5px 10px;font-size:11px}
.full{width:100%}
.field{margin-bottom:12px}
.field label{display:block;color:var(--mut);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:#0a0c10;border:1px solid var(--bor);border-radius:6px;padding:8px 10px;color:#dde3ef;font-size:13px;outline:none;box-sizing:border-box;font-family:inherit}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px}
.ovx{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 9px;color:var(--mut);border-bottom:1px solid var(--bor);font-size:10px;font-weight:700;white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid var(--bor);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.empty{text-align:center;padding:24px;color:var(--mut);font-size:12px}
.tag{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.mbox{background:var(--card);border:1px solid var(--bor);border-radius:14px;padding:24px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mhdr h3{color:var(--ac);margin:0;font-size:15px;font-weight:800}
.mc{background:none;border:none;color:var(--mut);cursor:pointer;font-size:20px;padding:0;line-height:1}
.divl{display:flex;align-items:center;gap:8px;margin:12px 0 10px}
.divl hr{flex:1;border:none;border-top:1px solid var(--bor)}
.divl span{color:var(--mut);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;white-space:nowrap}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tbtn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;background:var(--card);color:var(--mut);border:none;cursor:pointer;font-family:inherit}
.tbtn.active{background:var(--ok);color:#0a0c10}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:14px}
.pcard{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:14px}
.pcard.low{border-color:var(--err)}
.pcard.combo{border-color:var(--pur)}
.smini{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center;margin-top:8px}
.scell{background:var(--pan);border-radius:6px;padding:7px 3px}
.toast{position:fixed;bottom:22px;right:22px;background:var(--ok);color:#0a0c10;padding:11px 18px;border-radius:9px;font-weight:700;font-size:13px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:9999}
.toast.show{transform:translateY(0);opacity:1}
.warn-box{background:#f5c84211;border:1px solid #f5c84233;border-radius:8px;padding:9px 13px;font-size:12px;color:var(--ac);margin-bottom:12px}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sb-logo">
    <div class="n">🏪 KOF-EXPRESS</div>
    <div class="s" id="sb-empresa">Cargando...</div>
    <div class="mod-badge">📊 FINANZAS</div>
  </div>
  <nav id="nav">
    <button class="nb active" onclick="irA('resumen')"><span>📊</span>Resumen</button>
    <button class="nb" onclick="irA('inventario')"><span>📦</span>Inventario</button>
    <button class="nb" onclick="irA('productos')"><span>🏷️</span>Productos</button>
    <button class="nb" onclick="irA('deudas')"><span>💳</span>Deudas</button>
    <button class="nb" onclick="irA('salarios')"><span>👔</span>Salarios</button>
    <button class="nb" onclick="irA('gastos')"><span>📉</span>Gastos</button>
    <button class="nb" onclick="irA('reportes')"><span>📈</span>Reportes</button>
  </nav>
  <div class="sb-bottom">
    <a class="sb-link" href="A_Facturacion.html" target="_blank">🧾 Ir a Facturación</a>
    <a class="sb-link" href="C_TiendaWeb.html" target="_blank">🌐 Ir a Tienda</a>
    <div><span class="sync-dot" id="sync-dot"></span><span id="sync-txt">Conectando...</span></div>
  </div>
</div>
<div id="main">
  <div id="topbar">
    <button onclick="toggleSide()" style="background:none;border:none;color:var(--mut);font-size:18px;padding:0;cursor:pointer">☰</button>
    <h1 id="ptitle">Resumen Financiero</h1>
    <div id="tstats"></div>
  </div>
  <div id="content"><div class="empty">Conectando con Firebase...</div></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, update, remove, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB={apiKey:"AIzaSyAm0re-tCh5EPaynCHh3AzgiMw_1swREJM",authDomain:"kof-express.firebaseapp.com",databaseURL:"https://kof-express-default-rtdb.firebaseio.com",projectId:"kof-express",storageBucket:"kof-express.firebasestorage.app",messagingSenderId:"846750149946",appId:"1:846750149946:web:c330681d5fee8621c43403"};
const app=initializeApp(FB);
const db=getDatabase(app);

let D={empresa:{nombre:'KOF-EXPRESS',ruc:'00042567543',direccion:'SMP_LA HABANA_Tienda ONLINE',tel:'',email:''},tasa:{cup:245,transferPorc:10,zellePorc:2},facturas:{},productos:{},deudas:{},salarios:{},gastos:{}};
let MOD='resumen';

const uid=()=>Date.now()+Math.floor(Math.random()*9999);
const hoy=()=>new Date().toISOString().split('T')[0];
const usd=n=>'$'+Number(n||0).toFixed(2);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const tag=(t,c)=>`<span class="tag" style="background:${c}22;color:${c}">${t}</span>`;
function toast(msg,col='#22c55e'){const t=document.getElementById('toast');t.textContent=msg;t.style.background=col;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function gv(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function btn(l,cls,oc,sm=false){return `<button class="btn ${cls}${sm?' sm':''}" onclick="${oc}">${l}</button>`;}
function campo(lbl,inp,mb=12){return `<div class="field" style="margin-bottom:${mb}px"><label>${lbl}</label>${inp}</div>`;}
function inp(name,val,tipo='text',ph=''){return `<input name="${name}" type="${tipo}" value="${esc(val)}" placeholder="${ph}" step="${tipo==='number'?'0.01':''}" autocomplete="off">`;}
function sel(name,val,opts){return `<select name="${name}">${opts.map(o=>`<option value="${o.v??o}"${(o.v??o)==val?' selected':''}>${o.l??o}</option>`).join('')}</select>`;}
function abrirModal(h){document.body.insertAdjacentHTML('beforeend',h);}
function cerrarModal(id){const m=document.getElementById(id);if(m)m.remove();}
function tabla(cols,rows,acc){
  if(!rows.length)return '<div class="empty">Sin registros</div>';
  return `<div class="ovx"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}${acc?'<th>Acc.</th>':''}</tr></thead><tbody>${rows.map((r,i)=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}${acc?`<td><div style="display:flex;gap:4px">${acc(i)}</div></td>`:''}</tr>`).join('')}</tbody></table></div>`;
}
function sbox(lbl,val,col,ic=''){return `<div class="sbox"><div class="sl">${ic} ${lbl}</div><div class="sv" style="color:${col}">${val}</div></div>`;}

let sideOpen=true;
window.toggleSide=function(){sideOpen=!sideOpen;document.getElementById('sidebar').classList.toggle('closed',!sideOpen);document.getElementById('main').classList.toggle('full',!sideOpen);};

// FIREBASE LISTENERS
onValue(ref(db,'.info/connected'),snap=>{const on=snap.val();document.getElementById('sync-dot').className='sync-dot'+(on?'':' off');document.getElementById('sync-txt').textContent=on?'Sincronizado':'Sin conexión';});
onValue(ref(db,'config/empresa'),snap=>{if(snap.exists()){D.empresa=snap.val();document.getElementById('sb-empresa').textContent=D.empresa.nombre;}});
onValue(ref(db,'config/tasa'),snap=>{if(snap.exists())D.tasa=snap.val();});
onValue(ref(db,'facturas'),snap=>{D.facturas=snap.exists()?snap.val():{};if(MOD==='resumen'||MOD==='reportes')mostrar();actualizarStats();});
onValue(ref(db,'productos'),snap=>{
  // Store with key
  if(snap.exists()){const v=snap.val();Object.keys(v).forEach(k=>v[k]._key=k);D.productos=v;}
  else D.productos={};
  if(MOD==='inventario'||MOD==='productos')mostrar();actualizarStats();
});
onValue(ref(db,'deudas'),snap=>{D.deudas=snap.exists()?snap.val():{};if(MOD==='deudas')mostrar();actualizarStats();});
onValue(ref(db,'salarios'),snap=>{D.salarios=snap.exists()?snap.val():{};if(MOD==='salarios')mostrar();actualizarStats();});
onValue(ref(db,'gastos'),snap=>{D.gastos=snap.exists()?snap.val():{};if(MOD==='gastos'||MOD==='resumen')mostrar();actualizarStats();});

const MODS=[{id:'resumen',l:'Resumen'},{id:'inventario',l:'Inventario'},{id:'productos',l:'Productos'},{id:'deudas',l:'Deudas'},{id:'salarios',l:'Salarios'},{id:'gastos',l:'Gastos'},{id:'reportes',l:'Reportes'}];
window.irA=function(id){
  MOD=id;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const activeBtn=Array.from(document.querySelectorAll('.nb')).find(b=>b.getAttribute('onclick')?.includes(`'${id}'`));
  if(activeBtn)activeBtn.classList.add('active');
  document.getElementById('ptitle').textContent=MODS.find(m=>m.id===id)?.l||id;
  mostrar();
};

function calcGanNeta(){
  const tv=Object.values(D.facturas).reduce((s,f)=>s+(f.totalUSD||0),0);
  const tc=Object.values(D.facturas).reduce((s,f)=>s+(f.comisiones||0),0);
  const ts=Object.values(D.salarios).filter(x=>!x.pagado).reduce((s,x)=>s+x.monto,0);
  const tg=Object.values(D.gastos).filter(x=>!x.pagado).reduce((s,x)=>s+x.monto,0);
  return{tv,tc,ts,tg,ganB:tv-tc,ganN:tv-tc-ts-tg};
}

function actualizarStats(){
  const{tv,ganN}=calcGanNeta();
  const stock=Object.values(D.productos).filter(p=>p.tipo!=='combo').reduce((s,p)=>s+(p.almacen||0)+(p.tienda||0),0);
  const deudPend=Object.values(D.deudas).filter(d=>!d.pagada).reduce((s,d)=>s+d.monto,0);
  document.getElementById('tstats').innerHTML=
    `<div class="tstat">💵 <span style="color:var(--ok)">${usd(tv)}</span></div>`+
    `<div class="tstat">📦 <span style="color:var(--inf)">${stock}</span> uds</div>`+
    `<div class="tstat" style="border-color:${ganN>=0?'var(--ok)':'var(--err)'}">📈 <span style="color:${ganN>=0?'var(--ok)':'var(--err)'};font-weight:700">${usd(ganN)}</span></div>`+
    `<div class="tstat">💳 <span style="color:var(--err)">${usd(deudPend)}</span></div>`;
}

function mostrar(){
  const c=document.getElementById('content');
  if(MOD==='resumen')c.innerHTML=pResumen();
  else if(MOD==='inventario')c.innerHTML=pInventario();
  else if(MOD==='productos')c.innerHTML=pProductos();
  else if(MOD==='deudas')c.innerHTML=pDeudas();
  else if(MOD==='salarios')c.innerHTML=pSalarios();
  else if(MOD==='gastos')c.innerHTML=pGastos();
  else if(MOD==='reportes')c.innerHTML=pReportes();
}

// ════ RESUMEN ════════════════════════════════════════════════
function pResumen(){
  const{tv,tc,ts,tg,ganB,ganN}=calcGanNeta();
  const td=Object.values(D.deudas).filter(d=>!d.pagada).reduce((s,d)=>s+d.monto,0);
  let h=`<div class="phdr"><div><h2>Resumen Financiero</h2><p>Datos en tiempo real desde Firebase</p></div></div>`;
  h+=`<div class="stats">${sbox('Ventas USD',usd(tv),'#22c55e','💵')}${sbox('Comisiones',usd(tc),'#f97316','💸')}${sbox('Deudas',usd(td),'#ef4444','💳')}${sbox('Salarios Pend.',usd(ts),'#a855f7','👔')}${sbox('Gastos Pend.',usd(tg),'#ef4444','📉')}</div>`;
  h+=`<div class="card"><div class="ctitle">📈 Cálculo de Ganancias</div>`;
  [[' Ventas brutas',tv,'#22c55e',false],['− Comisiones gestores',tc,'#f97316',false],['= Ganancia bruta',ganB,'#14b8a6',false],['− Salarios pendientes',ts,'#a855f7',false],['− Gastos pendientes',tg,'#ef4444',false],['= GANANCIA NETA',ganN,ganN>=0?'#22c55e':'#ef4444',true]]
    .forEach(([l,v,col,big])=>{h+=`<div style="display:flex;justify-content:space-between;padding:${big?'11px':'7px'} 0;${big?'border-top:1px solid var(--bor);margin-top:7px':''}"><span style="color:${big?'#dde3ef':'var(--mut)'};font-size:${big?15:13}px;font-weight:${big?800:400}">${l}</span><span style="color:${col};font-weight:800;font-size:${big?20:14}px">${usd(v)}</span></div>`;});
  h+=`<div style="margin-top:10px;background:var(--pan);border-radius:7px;padding:9px 12px;font-size:11px;color:var(--mut)">En CUP (tasa ${D.tasa.cup}): <span style="color:var(--cup);font-weight:700">${Math.round(ganN*D.tasa.cup).toLocaleString()} CUP</span></div></div>`;
  // Últimas facturas
  const ultFacs=Object.values(D.facturas).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).slice(0,5);
  h+=`<div class="card"><div class="ctitle">🧾 Últimas 5 Facturas</div>`;
  if(!ultFacs.length)h+='<div class="empty">Sin facturas aún</div>';
  ultFacs.forEach(f=>{h+=`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bor)"><div><span style="color:var(--ac);font-weight:700">${esc(f.numero||'—')}</span> <span style="color:#dde3ef;font-size:13px">${esc(f.clienteNombre||'')}</span><div style="color:var(--mut);font-size:11px">${f.fecha||''}</div></div><div style="text-align:right"><div style="color:var(--ok);font-weight:700">${usd(f.totalUSD)}</div>${tag(f.estado||'Pendiente',f.estado==='Pagada'?'#22c55e':'#f97316')}</div></div>`;});
  h+='</div>';
  return h;
}

// ════ INVENTARIO ═════════════════════════════════════════════
function pInventario(){
  const prods=Object.values(D.productos);
  let h=`<div class="phdr"><div><h2>Inventario</h2><p>Stock en tiempo real — sincronizado con Facturación</p></div>${btn('+ Movimiento','bp','abrirMovInv()')}</div>`;
  h+='<div class="pgrid">';
  if(!prods.length)h+='<div style="grid-column:1/-1" class="empty">Sin productos. Ve a Productos para añadir.</div>';
  prods.forEach(p=>{
    const al=p.almacen||0,td=p.tienda||0,tot=al+td,low=tot<5;
    h+=`<div class="pcard${low?' low':''}${p.tipo==='combo'?' combo':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div style="color:var(--ac);font-weight:700;font-size:12px">${esc(p.codigo||'—')}</div><div style="font-size:14px;font-weight:600">${esc(p.nombre)}</div></div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${p.tipo==='combo'?'<span style="background:#a855f722;color:#a855f7;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700">COMBO</span>':''}${low?tag('⚠ BAJO','#ef4444'):''}</div>
      </div>
      <div class="smini">
        <div class="scell"><div style="color:var(--mut);font-size:9px">🏭 Almacén</div><div style="color:#3b82f6;font-weight:800;font-size:17px">${al}</div></div>
        <div class="scell"><div style="color:var(--mut);font-size:9px">🏪 Tienda</div><div style="color:#22c55e;font-weight:800;font-size:17px">${td}</div></div>
        <div class="scell"><div style="color:var(--mut);font-size:9px">📊 Total</div><div style="color:var(--ac);font-weight:800;font-size:17px">${tot}</div></div>
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--mut)">Precio: <span style="color:#dde3ef">${usd(p.precio)}</span> · Costo: <span style="color:#dde3ef">${usd(p.costo||0)}</span></div>
    </div>`;
  });
  h+='</div>';
  // Movimientos
  const movs=Object.entries(D.gastos).filter(([k,v])=>v.categoria==='Movimiento').map(([k,v])=>({...v,_key:k}));
  h+=`<div class="card"><div class="ctitle">Últimos Movimientos de Inventario</div><div class="empty">Los movimientos se registran automáticamente al emitir facturas y al usar el módulo de Productos.</div></div>`;
  return h;
}

window.abrirMovInv=function(){
  const prodOpts=[{v:'',l:'— Seleccionar —'},...Object.values(D.productos).filter(p=>p.tipo!=='combo').map(p=>({v:p._key||p.codigo,l:p.codigo+' · '+p.nombre+' (Alm:'+(p.almacen||0)+' Tda:'+(p.tienda||0)+')'}) )];
  let h=`<div class="mbg" id="m-inv"><div class="mbox"><div class="mhdr"><h3>Nuevo Movimiento</h3><button class="mc" onclick="cerrarModal('m-inv')">✕</button></div>`;
  h+=`<form onsubmit="guardarMov(event)">`;
  h+=`<div class="g2">${campo('Fecha',inp('mFecha',hoy(),'date'))}${campo('Tipo',sel('mTipo','Entrada',['Entrada','Salida','Almacén→Tienda','Tienda→Almacén']))}</div>`;
  h+=campo('Producto',sel('mProd','',prodOpts));
  h+=campo('Cantidad',inp('mCant',1,'number'));
  h+=campo('Motivo',inp('mMotivo','','text','Compra, ajuste, devolución...'));
  h+=campo('Origen / Proveedor',inp('mOrigen',''));
  h+=`<button type="submit" class="btn bp full">Guardar Movimiento</button></form></div></div>`;
  abrirModal(h);
};
window.guardarMov=async function(e){
  e.preventDefault();
  const cant=+gv('mCant'),pkey=gv('mProd'),tipo=gv('mTipo');
  const p=D.productos[pkey]||Object.values(D.productos).find(x=>x.codigo===pkey);
  if(!p){toast('Selecciona un producto','#f97316');return;}
  const key=p._key||pkey;
  let al=p.almacen||0,ti=p.tienda||0;
  if(tipo==='Entrada')al+=cant;
  else if(tipo==='Salida')al=Math.max(0,al-cant);
  else if(tipo==='Almacén→Tienda'){al=Math.max(0,al-cant);ti+=cant;}
  else if(tipo==='Tienda→Almacén'){ti=Math.max(0,ti-cant);al+=cant;}
  await update(ref(db,'productos/'+key),{almacen:al,tienda:ti});
  toast('✅ Inventario actualizado y sincronizado');
  cerrarModal('m-inv');
};

// ════ PRODUCTOS ══════════════════════════════════════════════
function pProductos(){

  h+=`<div class="warn-box">💡 Los productos que añadas aquí estarán disponibles automáticamente para facturar y aparecerán en la Tienda Web.</div>`;
  const cols=['Tipo','Código','Nombre','U/M','Costo','Com.','Ganancia','P.Venta','Almacén','Tienda'];
  const rows=prods.map(p=>[
    p.tipo==='combo'?'<span style="background:#a855f722;color:#a855f7;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700">COMBO</span>':'<span style="color:var(--mut);font-size:10px">simple</span>',
    `<span style="color:var(--ac);font-weight:700">${esc(p.codigo||'')}</span>`,esc(p.nombre||''),esc(p.unidad||'Unidad'),

  ]);

window.abrirProd=function(key){
  const p=key?D.productos[key]:null;
  let h=`<div class="mbg" id="m-prod"><div class="mbox"><div class="mhdr"><h3>${p?'Editar Producto':'Nuevo Producto'}</h3><button class="mc" onclick="cerrarModal('m-prod')">✕</button></div>`;
  h+=`<form onsubmit="guardarProd(event,'${key||''}')">`;
  h+=`<div class="g2">${campo('Código',inp('pCod',p?.codigo||'','text','VES-001'))}${campo('Unidad',sel('pUnid',p?.unidad||'Unidad',['Unidad','Par','Caja','Docena','Kg','Litro','Metro','Paquete']))}</div>`;
  h+=campo('Nombre del Producto',inp('pNom',p?.nombre||''));
  h+='<div class="divl"><hr><span>Precio (USD)</span><hr></div>';
  h+=`<div class="g3">${campo('Costo ($)',inp('pCosto',p?.costo||0,'number'))}${campo('Comisión ($)',inp('pCom',p?.comisionFija||p?.comision||0,'number'))}${campo('Ganancia ($)',inp('pGan',p?.ganancia||0,'number'))}</div>`;
  const calc=(p?.costo||0)+(p?.comisionFija||p?.comision||0)+(p?.ganancia||0);
  h+=`<div style="background:var(--pan);border-radius:7px;padding:9px 12px;display:flex;justify-content:space-between;margin-bottom:10px"><span style="color:var(--mut);font-size:12px">Precio calculado automático</span><span id="pCalc" style="color:var(--ac);font-weight:800">${usd(calc)}</span></div>`;
  h+=campo('Precio de Venta Final ($)',inp('pPrecio',p?.precio||calc,'number'));
  h+='<div class="divl"><hr><span>Stock</span><hr></div>';
  h+=`<div class="g2">${campo('Stock Almacén',inp('pAlm',p?.almacen||0,'number'))}${campo('Stock Tienda',inp('pTda',p?.tienda||0,'number'))}</div>`;
  h+=campo('Descripción para Tienda Web',`<textarea name="pDesc" style="width:100%;background:#0a0c10;border:1px solid var(--bor);border-radius:6px;padding:8px 10px;color:#dde3ef;font-size:13px;outline:none;resize:vertical;min-height:60px;font-family:inherit;box-sizing:border-box" placeholder="Describe el producto para que los clientes lo vean en la tienda...">${esc(p?.descripcion||'')}</textarea>`);
  h+=campo('URL de Imagen (opcional)',inp('pImg',p?.imagen||'','text','https://...'));
  h+=`<button type="submit" class="btn bp full">Guardar Producto</button></form></div></div>`;
  abrirModal(h);
  setTimeout(()=>{
    ['pCosto','pCom','pGan'].forEach(n=>{
      document.querySelector(`[name=${n}]`)?.addEventListener('input',()=>{
        const c=+document.querySelector('[name=pCosto]')?.value||0;
        const cm=+document.querySelector('[name=pCom]')?.value||0;
        const g=+document.querySelector('[name=pGan]')?.value||0;
        const pc=document.getElementById('pCalc');if(pc)pc.textContent=usd(c+cm+g);
        const pr=document.querySelector('[name=pPrecio]');if(pr)pr.value=(c+cm+g).toFixed(2);
      });
    });
  },100);
};
window.guardarProd=async function(e,key){
  e.preventDefault();
  const item={tipo:'simple',codigo:gv('pCod'),nombre:gv('pNom'),unidad:document.querySelector('[name=pUnid]')?.value||'Unidad',costo:+gv('pCosto'),comisionFija:+gv('pCom'),ganancia:+gv('pGan'),precio:+gv('pPrecio'),almacen:+gv('pAlm'),tienda:+gv('pTda'),descripcion:document.querySelector('[name=pDesc]')?.value||'',imagen:gv('pImg'),activo:true};
  if(key)await update(ref(db,'productos/'+key),item);
  else await push(ref(db,'productos'),item);

};

window.abrirCombo=function(key){
  const p=key?D.productos[key]:null;
  const simples=Object.values(D.productos).filter(x=>x.tipo!=='combo');
  let h=`<div class="mbg" id="m-combo"><div class="mbox" style="max-width:600px"><div class="mhdr"><h3>${p?'Editar Combo':'Nuevo Combo'}</h3><button class="mc" onclick="cerrarModal('m-combo')">✕</button></div>`;
  h+=`<div class="warn-box">Los combos agrupan productos simples a un precio especial. Al vender un combo, sus componentes se descuentan del inventario.</div>`;
  h+=`<div class="g2">${campo('Código del Combo',inp('cCod',p?.codigo||'','text','CMB-001'))}${campo('Nombre del Combo',inp('cNom',p?.nombre||''))}</div>`;
  h+=campo('Componentes del Combo','<div id="combo-comp-list"><div class="empty">Añade productos al combo</div></div>');
  h+=`<div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:10px">
    <div style="flex:3">${campo('Producto a añadir',sel('cAdd','',simples.map(x=>({v:x._key||x.codigo,l:x.codigo+' · '+x.nombre}))),0)}</div>
    <div style="flex:1">${campo('Cant.',inp('cCant',1,'number'),0)}</div>
    <div>${btn('+ Añadir','bp','addCompCombo()',true)}</div></div>`;
  h+=`<div class="g3">${campo('Costo ($)',inp('cCosto',p?.costo||0,'number'))}${campo('Comisión ($)',inp('cCom',p?.comisionFija||0,'number'))}${campo('Ganancia ($)',inp('cGan',p?.ganancia||0,'number'))}</div>`;
  h+=campo('Precio Final del Combo ($)',inp('cPrecio',p?.precio||0,'number'));
  h+=campo('Descripción para Tienda Web',`<textarea name="cDesc" style="width:100%;background:#0a0c10;border:1px solid var(--bor);border-radius:6px;padding:8px 10px;color:#dde3ef;font-size:13px;outline:none;resize:vertical;min-height:50px;font-family:inherit;box-sizing:border-box">${esc(p?.descripcion||'')}</textarea>`);
  h+=`${btn('✅ Guardar Combo','btn bpur full',`guardarCombo('${key||''}')`)}`;

  abrirModal(h);
  window._comboComps=p?.componentes?JSON.parse(JSON.stringify(p.componentes)):[];
  renderComboComps();
};
window._comboComps=[];
window.addCompCombo=function(){
  const pkey=document.querySelector('[name=cAdd]')?.value;
  const cant=+document.querySelector('[name=cCant]')?.value||1;
  const p=D.productos[pkey]||Object.values(D.productos).find(x=>x.codigo===pkey);
  if(!p){return;}
  const ex=window._comboComps.find(c=>c.pid===pkey);
  if(ex)ex.cant+=cant;else window._comboComps.push({pid:pkey,cant});
  renderComboComps();
};
function renderComboComps(){
  const el=document.getElementById('combo-comp-list');if(!el)return;
  if(!window._comboComps.length){el.innerHTML='<div class="empty">Sin componentes</div>';return;}
  el.innerHTML=window._comboComps.map((c,i)=>{
    const p=D.productos[c.pid]||Object.values(D.productos).find(x=>x.codigo===c.pid);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bor)"><span style="color:#dde3ef;font-size:13px">${p?esc(p.nombre):'—'} <span style="color:var(--pur);font-weight:700">×${c.cant}</span></span>${btn('✕','bd',`quitarCompCombo(${i})`,true)}</div>`;
  }).join('');
}
window.quitarCompCombo=function(i){window._comboComps.splice(i,1);renderComboComps();};
window.guardarCombo=async function(key){
  if(!window._comboComps.length){toast('Añade al menos un componente','#f97316');return;}
  const item={tipo:'combo',codigo:gv('cCod'),nombre:gv('cNom'),unidad:'Combo',costo:+gv('cCosto'),comisionFija:+gv('cCom'),ganancia:+gv('cGan'),precio:+gv('cPrecio'),almacen:0,tienda:0,componentes:window._comboComps.slice(),descripcion:document.querySelector('[name=cDesc]')?.value||'',activo:true};
  if(key)await update(ref(db,'productos/'+key),item);
  else await push(ref(db,'productos'),item);
  toast('✅ Combo guardado y sincronizado');
  cerrarModal('m-combo');
};
window.elimProd=async function(key){
  if(!confirm('¿Eliminar producto?'))return;
  await remove(ref(db,'productos/'+key));
  toast('Producto eliminado');
};

// ════ REPORTES ════════════════════════════════════════════════
function pReportes(){
  const facs=Object.values(D.facturas);
  // Top productos
  const ventas={};
  facs.forEach(f=>(f.items||[]).forEach(it=>{ventas[it.codigo]=ventas[it.codigo]||{codigo:it.codigo,nombre:it.nombre,units:0,total:0};ventas[it.codigo].units+=it.cant||1;ventas[it.codigo].total+=(it.precio||0)*(it.cant||1);}));
  const topProds=Object.values(ventas).sort((a,b)=>b.total-a.total).slice(0,10);
  // Por gestor
  const porGestor={};
  facs.forEach(f=>{const k=f.gestorId||'Sin gestor';porGestor[k]=porGestor[k]||{gestor:k,n:0,total:0,com:0};porGestor[k].n++;porGestor[k].total+=f.totalUSD||0;porGestor[k].com+=f.comisiones||0;});
  const byGes=Object.values(porGestor).sort((a,b)=>b.total-a.total);
  // Stock bajo
  const bajos=Object.values(D.productos).filter(p=>(p.almacen||0)+(p.tienda||0)<5);
  let h=`<h2 style="color:var(--ac);margin-bottom:4px">Reportes y Análisis</h2><p style="color:var(--mut);font-size:12px;margin-bottom:18px">Datos en tiempo real desde Firebase</p>`;
  h+=`<div class="card"><div class="ctitle">🏆 Top Productos Más Vendidos</div>${!topProds.length?'<div class="empty">Sin ventas aún</div>':tabla(['Código','Producto','Uds. Vendidas','Total USD'],topProds.map(p=>[`<span style="color:var(--ac)">${esc(p.codigo)}</span>`,esc(p.nombre),`<span style="color:var(--inf);font-weight:700">${p.units}</span>`,`<span style="color:var(--ok);font-weight:700">${usd(p.total)}</span>`]))}</div>`;
  h+=`<div class="card"><div class="ctitle">💸 Comisiones por Gestor</div>${!byGes.length?'<div class="empty">Sin ventas aún</div>':tabla(['Gestor','Facturas','Total Vendido','Comisiones'],byGes.map(g=>[esc(g.gestor),g.n,`<span style="color:var(--ok)">${usd(g.total)}</span>`,`<span style="color:var(--cup);font-weight:800">${usd(g.com)}</span>`]))}</div>`;
  h+=`<div class="card"><div class="ctitle">⚠️ Stock Bajo (menos de 5 unidades)</div>${!bajos.length?'<div class="empty" style="color:var(--ok)">✅ Todo el stock está bien</div>':tabla(['Código','Nombre','Almacén','Tienda','Total'],bajos.map(p=>[`<span style="color:var(--ac)">${esc(p.codigo||'')}</span>`,esc(p.nombre||''),`<span style="color:var(--err)">${p.almacen||0}</span>`,`<span style="color:var(--err)">${p.tienda||0}</span>`,`<span style="color:var(--err);font-weight:800">${(p.almacen||0)+(p.tienda||0)}</span>`]))}</div>`;
  return h;
}
